[alembic]
# Path to the alembic directory, relative to this file
script_location = alembic

# Adds backend/ to sys.path so "from app...." imports work in env.py
prepend_sys_path = .

# Use OS separator for version file paths
version_path_separator = os

# URL is intentionally left as a placeholder —
# env.py reads the real value from app.core.config.settings
sqlalchemy.url = driver://user:pass@localhost/dbname


# --- Logging ---

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
