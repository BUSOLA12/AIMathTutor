app = "ai-math-tutor-api"
primary_region = "lax"

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    grace_period = "10s"
    interval = "30s"
    method = "GET"
    path = "/health"
    timeout = "5s"

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1

# Environment variables — set secrets with: fly secrets set KEY=value
# fly secrets set ANTHROPIC_API_KEY=... DATABASE_URL=... REDIS_URL=...
